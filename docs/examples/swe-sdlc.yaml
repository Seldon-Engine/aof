# Software Engineering SDLC Workflow (DAG Format)
#
# A production-grade SDLC workflow with 5 hops: implement, test, review,
# security-review (conditional), and deploy. Demonstrates dependsOn edges,
# conditional hops with the JSON DSL, rejection, timeouts, and escalation.
#
# DAG structure:
#   [implement] --> [test] --> [review] --> [deploy]
#                                ^
#                                |
#   [implement] --> [security-review] --+
#                  (conditional)
#
# - implement is the root hop
# - test and security-review both depend on implement (parallel after implement)
# - security-review only activates if task has "security" or "auth" tag
# - review depends on both test and security-review (AND-join)
# - deploy depends on review
# - review can reject back to origin (restarts from implement)

name: swe-sdlc

hops:
  # ========================================================================
  # Hop 1: Implementation (root)
  # ========================================================================
  - id: implement
    role: developer
    description: "Implement feature with tests and documentation"
    timeout: 4h
    escalateTo: architect

  # ========================================================================
  # Hop 2: Testing
  # ========================================================================
  # Runs after implementation. QA validates functionality.
  - id: test
    role: qa
    dependsOn: [implement]
    canReject: true
    rejectionStrategy: origin
    description: "Functional, integration, and regression testing"
    timeout: 3h
    escalateTo: qa-lead

  # ========================================================================
  # Hop 3: Security Review (conditional)
  # ========================================================================
  # Only activates when the task is tagged "security" or "auth".
  # Runs in parallel with test (both depend on implement).
  # If the condition is false, this hop is skipped and does not block review.
  - id: security-review
    role: security
    dependsOn: [implement]
    canReject: true
    rejectionStrategy: origin
    description: "Security audit for auth, encryption, and data access"
    timeout: 2h
    escalateTo: security-lead
    condition:
      op: or
      conditions:
        - op: has_tag
          value: security
        - op: has_tag
          value: auth

  # ========================================================================
  # Hop 4: Code Review (AND-join)
  # ========================================================================
  # Waits for BOTH test and security-review to complete (or be skipped).
  # joinType: "all" (default) means all predecessors must be terminal.
  # If security-review was skipped, review still proceeds.
  - id: review
    role: architect
    dependsOn: [test, security-review]
    joinType: all
    canReject: true
    rejectionStrategy: origin
    description: "Architecture and code quality review"
    timeout: 2h
    escalateTo: tech-lead

  # ========================================================================
  # Hop 5: Deploy
  # ========================================================================
  # Final hop -- deploys after review approval.
  - id: deploy
    role: sre
    dependsOn: [review]
    description: "Deploy to production and verify"
    timeout: 1h
    escalateTo: ops-lead
