# Simple Review Workflow (DAG Format)
#
# The minimal DAG workflow for teams getting started. Two hops:
# implement -> review, with rejection sending work back to origin.
#
# DAG structure:
#   [implement] --> [review]
#
# - implement is a root hop (no dependsOn), starts immediately as "ready"
# - review depends on implement, becomes ready when implement completes
# - review can reject, which resets all hops to initial state (origin strategy)
#
# To use this workflow:
# 1. Add this to your project.yaml under workflowTemplates
# 2. Create tasks with: bd task create "My task" --workflow simple-review
# 3. The scheduler dispatches hops automatically based on role assignments

# This is a WorkflowDefinition -- it defines the immutable DAG shape.
# At task creation, AOF initializes mutable execution state from this definition.

name: simple-review

hops:
  # Hop 1: Implementation
  # Root hop (no dependsOn) -- starts immediately when workflow begins.
  # Assigned to the "developer" role from the org chart.
  - id: implement
    role: developer
    description: "Implement the feature or fix with tests"
    # No dependsOn means this is a root hop -- it starts as "ready"
    # autoAdvance defaults to true -- on completion, downstream hops are evaluated

  # Hop 2: Code Review
  # Depends on implement -- becomes ready only after implement completes.
  # canReject: true allows the reviewer to send work back.
  - id: review
    role: reviewer
    dependsOn: [implement]
    canReject: true
    rejectionStrategy: origin    # On rejection, reset ALL hops (restart workflow)
    description: "Review code quality, tests, and correctness"

# Example: using this template in project.yaml
#
# workflowTemplates:
#   simple-review:
#     name: simple-review
#     hops:
#       - id: implement
#         role: developer
#       - id: review
#         role: reviewer
#         dependsOn: [implement]
#         canReject: true
#         rejectionStrategy: origin
