# Sales Pipeline Workflow (DAG Format)
#
# Demonstrates domain-neutrality of DAG workflows by applying the same
# primitives to a sales qualification and closing process.
#
# DAG structure:
#   [qualify] --> [propose] --> [negotiate] --> [close]
#                    |
#                    +--> [legal-review] --+
#                         (conditional)    |
#                                          v
#                                      [negotiate]
#
# - qualify is the root hop (BDR qualifies the lead)
# - propose depends on qualify (AE creates proposal)
# - legal-review depends on propose, conditional on "enterprise" or "contract" tag
# - negotiate depends on both propose and legal-review (AND-join)
# - close depends on negotiate (VP Sales final sign-off)
# - Timeouts use longer durations appropriate for sales cycles (24h-5d)

name: sales-pipeline

hops:
  # ========================================================================
  # Hop 1: Lead Qualification (root)
  # ========================================================================
  - id: qualify
    role: bdr
    description: "Qualify lead: Budget, Authority, Need, Timeline (BANT)"
    timeout: 24h
    escalateTo: sales-manager

  # ========================================================================
  # Hop 2: Proposal Development
  # ========================================================================
  - id: propose
    role: ae
    dependsOn: [qualify]
    canReject: true
    rejectionStrategy: origin
    description: "Create proposal: solution design, pricing, SOW"
    timeout: 48h
    escalateTo: sales-manager

  # ========================================================================
  # Hop 3: Legal Review (conditional)
  # ========================================================================
  # Only activates for enterprise deals or those needing custom contract terms.
  # Runs in parallel with the path to negotiate if applicable.
  - id: legal-review
    role: legal
    dependsOn: [propose]
    canReject: true
    rejectionStrategy: origin
    description: "Review contract terms, compliance, and risk"
    timeout: 48h
    escalateTo: general-counsel
    condition:
      op: or
      conditions:
        - op: has_tag
          value: enterprise
        - op: has_tag
          value: contract

  # ========================================================================
  # Hop 4: Negotiation (AND-join)
  # ========================================================================
  # Waits for propose and legal-review (if active) before negotiating.
  # If legal-review was skipped (non-enterprise deal), negotiate proceeds
  # immediately after propose.
  - id: negotiate
    role: ae
    dependsOn: [propose, legal-review]
    joinType: all
    canReject: true
    rejectionStrategy: origin
    description: "Negotiate pricing, terms, and timeline with prospect"
    timeout: 5d
    escalateTo: sales-director

  # ========================================================================
  # Hop 5: Final Close
  # ========================================================================
  - id: close
    role: vp-sales
    dependsOn: [negotiate]
    autoAdvance: false           # Requires human review before marking done
    description: "Final approval and contract signature"
    timeout: 48h
    escalateTo: cro
